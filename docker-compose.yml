services:
  django:
    build: .
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - MINIO_ENDPOINT=minio:9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DAPHNE_PORT=8001
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- CELERY FOR GROQ 
  celery-worker:
    build: .
    container_name: celery-worker
    command: celery -A core worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_BACKEND=groq
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-jobplatform}
      POSTGRES_USER: ${DB_USER:-jobplatform}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jobplatform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-jobplatform}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-jobplatform}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    ports:    # Use "network_mode: host" in prod for better performance
      - "7880:7880"
      - "7881:7881"
      - "7882-7892:7882-7892/udp"
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
      LIVEKIT_CONFIG: |
        port: 7880
        rtc:
          tcp_port: 7881
          udp_port: 7882-7892
          use_external_ip: false
        redis:
          address: redis:6379
        logging:
          level: warn
          sample: true
    command: --bind 0.0.0.0
    depends_on:
      redis:
        condition: service_healthy
  # --- OLLAMA FOR NVIDIA USERS ---
  # Usage: docker compose --profile nvidia up -d
  ollama-nvidia:
    image: ollama/ollama:latest
    container_name: ollama-nvidia
    profiles: [nvidia]
    volumes:
      - ollama_data_nvidia:/root/.ollama
    ports:
      - "8080:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=1
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull ${OLLAMA_MODEL:-qwen2.5:3b} && wait"]
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - default

  # --- LLAMA.CPP FOR AMD USERS ---
  # Usage: docker compose --profile amd up -d
  # Place your .gguf model in ./models/ before starting
  # Check your GPU architecture: 10.3.0 = RDNA2, 11.0.0 = RDNA3
  llama-cpp-amd:
    image: ghcr.io/ggml-org/llama.cpp:server-rocm
    container_name: llama-cpp-amd
    profiles: [amd]
    volumes:
      - ./models:/models
    ports:
      - "8080:8080"
    environment:
      - LLAMA_ARG_MODEL=/models/${LLAMA_MODEL:-model.gguf}
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_N_GPU_LAYERS=999
      - LLAMA_ARG_PARALLEL=4
      - LLAMA_ARG_CTX_SIZE=4096
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    group_add:
      - video
      - render
    networks:
      - default

  # --- LLAMA.CPP CPU ONLY ---
  # Usage: docker compose --profile cpu up -d
  llama-cpp-cpu:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-cpp-cpu
    profiles: [cpu]
    volumes:
      - ./models:/models
    ports:
      - "8080:8080"
    environment:
      - LLAMA_ARG_MODEL=/models/${LLAMA_MODEL:-model.gguf}
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_PARALLEL=2
      - LLAMA_ARG_CTX_SIZE=4096
    networks:
      - default

  # --- CELERY FOR NVIDIA (ollama) ---
  celery-worker-nvidia:
    build: .
    container_name: celery-worker-nvidia
    profiles: [nvidia]
    command: celery -A core worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_BACKEND=ollama
      - OLLAMA_HOST=http://ollama-nvidia:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama-nvidia:
        condition: service_started
    networks:
      - default

  # --- CELERY FOR AMD (llama.cpp) ---
  celery-worker-amd:
    build: .
    container_name: celery-worker-amd
    profiles: [amd]
    command: celery -A core worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_BACKEND=llama
      - LLAMA_HOST=http://llama-cpp-amd:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      llama-cpp-amd:
        condition: service_started
    networks:
      - default

  # --- CELERY FOR CPU (llama.cpp) ---
  celery-worker-cpu:
    build: .
    container_name: celery-worker-cpu
    profiles: [cpu]
    command: celery -A core worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_BACKEND=llama
      - LLAMA_HOST=http://llama-cpp-cpu:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      llama-cpp-cpu:
        condition: service_started
    networks:
      - default

volumes:
  postgres_data:
  minio_data:
  ollama_data_nvidia: