services:
  django:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - MINIO_ENDPOINT=minio:9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_NVIDIA_ENDPOINT=http://ollama-nvidia:11434
      - AI_AMD_ENDPOINT=http://llama-cpp-amd:8080
      - AI_CPU_ENDPOINT=http://llama-cpp-cpu:8080
      - MINIO_PUBLIC_ENDPOINT=https://${HOST_PUBLIC_ENDPOINT:-localhost}/minio
      - LIVEKIT_URL=wss://${HOST_PUBLIC_ENDPOINT:-localhost}/livekit
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-jobplatform}
      POSTGRES_USER: ${DB_USER:-jobplatform}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jobplatform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio:
    image: minio/minio
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-jobplatform}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-jobplatform}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    network_mode: host
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
      LIVEKIT_CONFIG: |
        port: 7880
        rtc:
          tcp_port: 7881
          udp_port: 7882-7892
          use_external_ip: true
          interfaces:
            excludes:
              - docker0
        redis:
          address: localhost:6379
        logging:
          level: warn
          sample: true
    command: --bind 0.0.0.0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- OLLAMA FOR NVIDIA USERS ---
  ollama-nvidia:
    image: ollama/ollama:latest
    container_name: ollama-nvidia
    profiles: [nvidia]
    volumes:
      - ollama_data_nvidia:/root/.ollama
    ports:
      - "8080:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=1
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull ${AI_LOCAL_MODEL:-qwen2.5:3b} && wait"]
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - default

  # --- LLAMA.CPP FOR AMD USERS ---
  llama-cpp-amd:
    image: ghcr.io/ggml-org/llama.cpp:server-rocm
    container_name: llama-cpp-amd
    profiles: [amd]
    volumes:
      - ./models:/models
    ports:
      - "8080:8080"
    environment:
      - LLAMA_ARG_MODEL=/models/${AI_LOCAL_MODEL:-model.gguf}
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_N_GPU_LAYERS=999
      - LLAMA_ARG_PARALLEL=4
      - LLAMA_ARG_CTX_SIZE=4096
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    group_add:
      - video
      - render
    networks:
      - default

  # --- LLAMA.CPP CPU ONLY ---
  llama-cpp-cpu:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-cpp-cpu
    profiles: [cpu]
    volumes:
      - ./models:/models
    ports:
      - "8080:8080"
    environment:
      - LLAMA_ARG_MODEL=/models/${AI_LOCAL_MODEL:-model.gguf}
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_PORT=8080
      - LLAMA_ARG_PARALLEL=2
      - LLAMA_ARG_CTX_SIZE=4096
    networks:
      - default

  celery-worker:
    image: job-platform-backend-django  # reuse the already-built django image
    container_name: celery-worker
    command: celery -A core worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - MINIO_ENDPOINT=minio:9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_NVIDIA_ENDPOINT=http://ollama-nvidia:11434
      - AI_AMD_ENDPOINT=http://llama-cpp-amd:8080
      - AI_CPU_ENDPOINT=http://llama-cpp-cpu:8080
      - MINIO_PUBLIC_ENDPOINT=https://${HOST_PUBLIC_ENDPOINT:-localhost}/minio
      - LIVEKIT_URL=wss://${HOST_PUBLIC_ENDPOINT:-localhost}/livekit
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    image: job-platform-backend-django
    container_name: celery-beat
    command: celery -A core beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - MINIO_ENDPOINT=minio:9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_PUBLIC_ENDPOINT=https://${HOST_PUBLIC_ENDPOINT:-localhost}/minio
      - LIVEKIT_URL=wss://${HOST_PUBLIC_ENDPOINT:-localhost}/livekit
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  ollama_data_nvidia: