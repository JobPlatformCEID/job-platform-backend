services:
  django:
    build: .
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - MINIO_ENDPOINT=minio:9000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DAPHNE_PORT=8001
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-jobplatform}
      POSTGRES_USER: ${DB_USER:-jobplatform}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jobplatform}
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Needed so that our DB in docker doesn't get deleted
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-jobplatform}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-jobplatform}
    volumes:
      - minio_data:/data      # Needed so that our minio bucket in docker doesn't get deleted
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    ports:    # Use "network_mode: host" in prod for better performance
      - "7880:7880"
      - "7881:7881"
      - "7882-7892:7882-7892/udp"
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
      LIVEKIT_CONFIG: |
        port: 7880
        rtc:
          tcp_port: 7881
          udp_port: 7882-7892
          use_external_ip: false
        redis:
          address: redis:6379
        logging:
          level: warn
          sample: true
    command: --bind 0.0.0.0
    depends_on:
      redis:
        condition: service_healthy
  # --- OLLAMA FOR NVIDIA USERS ---
  ollama-nvidia:
    image: ollama/ollama:latest
    container_name: ollama-nvidia
    profiles: [nvidia]
    volumes:
      - ollama_data_nvidia:/root/.ollama
    ports:
      - "11434:11434"
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull ${OLLAMA_MODEL:-qwen2.5:3b} && wait"]
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - default

  # --- OLLAMA FOR AMD USERS ---
  ollama-amd:
    image: ollama/ollama:rocm
    container_name: ollama-amd
    profiles: [amd]
    volumes:
      - ollama_data_amd:/root/.ollama
    ports:
      - "11434:11434"
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull ${OLLAMA_MODEL:-qwen2.5:3b} && wait"]
    env_file:
      - .env
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    group_add:
      - video
      - render
    environment:
      # Check your GPU architecture — 10.3.0 = RDNA2, 11.0.0 = RDNA3
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
    networks:
      - default

volumes:
  ollama_data_nvidia:
  ollama_data_amd:
  postgres_data:
  minio_data:
